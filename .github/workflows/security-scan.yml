name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@v3.88.18
        with:
          path: ./
          extra_args: --only-verified --exclude-paths=.trufflehogignore
        continue-on-error: false

      - name: GitLeaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: MyApp/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: MyApp

      - name: Lint
        run: npm run lint
        working-directory: MyApp

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: MyApp

      - name: Run tests
        run: npm test -- --passWithNoTests --forceExit
        working-directory: MyApp
        env:
          # Provide placeholder values so supabase client doesn't crash during tests
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder_key
